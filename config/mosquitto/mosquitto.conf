# FallHelp — Local Dev Mosquitto Config (no auth)
# Copy/symlink to your Mosquitto config directory:
#   Windows: C:\Program Files\mosquitto\mosquitto.conf
#   Linux:   /etc/mosquitto/conf.d/fallhelp.conf

listener 1883 0.0.0.0
allow_anonymous true

log_type error
log_type warning
log_type notice
log_type information
